name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Admin panel: type check + build verification
  # ─────────────────────────────────────────────────────────────────
  admin-panel:
    name: Admin Panel — Type Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-panel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}

  # ─────────────────────────────────────────────────────────────────
  # RSS engine: syntax lint + typecheck
  # ─────────────────────────────────────────────────────────────────
  rss-engine:
    name: RSS Engine — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rss-engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: rss-engine/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (syntax check)
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  # ─────────────────────────────────────────────────────────────────
  # Mobile app: TypeScript type check
  # ─────────────────────────────────────────────────────────────────
  mobile-app:
    name: Mobile App — Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck
